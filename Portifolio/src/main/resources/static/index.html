<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="logo">Daniel<span>.Dev</span></div>
    <ul class="nav-links">
        <li><a href="#inicio">Home</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#habilidades">Habilidades</a></li>
        <li><a href="#projetos">Projetos</a></li>
        <li><a href="#contato">Contato</a></li>
        <li><button onclick="toggleAdmin()" class="btn-admin">⚙️</button></li>
    </ul>
</nav>

<header class="hero">
    <div class="hero-content">
        <img src="img/OIP.jpeg" alt="Descrição da imagem">
        <h1>Ola, eu sou o <span class="highlight">Daniel Adolfo</span></h1>
        <p>Desenvolvedor Full Stack.</p>
        <h2>Transformando ideias em código com Java, Spring Boot e React. Atualmente focado em criar soluções robustas e escaláveis</h2>
        <div class="hero-btns">
            <a href="#projetos" class="btn-primary">Ver Projetos</a>
            <a href="#contato" class="btn-secondary">Contato</a>
        </div>
    </div>
    <div class="hero-image">
        <div class="img-placeholder"></div>
    </div>
    <div class="hero-content">

    </div>
    <div class="hero-image">
        <div class="img-placeholder"></div>
    </div>
</header>

<div id="admin-area" class="admin-overlay">
    <div class="prancheta">
        <button onclick="toggleAdmin()" class="btn-close">X</button>
    </div>
</div>
<main class="container">
    <div class="admin-area">
    <section class="admin-panel">
        <div class="formulario">
            <h3> Novo Projeto</h3>
            <div class="form-group">
                <label for="titulo">Projeto</label>
                <input type="text" id="titulo" placeholder="Ex: Sistema de Cadastro">

                <label for="tecnologia">Tecnologias</label>
                <input type="text" id="tecnologia" placeholder="Ex: Java & Spring">

                <label for="descricao">Descrição</label>
                <textarea id="descricao" rows="3" placeholder="Conte um pouco sobre o projeto..."></textarea>

                <label for="linkGithub">Link do Repositorio</label>
                <input type="text" id="linkGithub" placeholder="https://github.com/...">

                <button onclick="salvarProjeto()" class="btn-save">Salvar projeto</button>
            </div>
        </div>
    </section>
    </div>

    <section id="lista-projetos" class="projects-grid">
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
